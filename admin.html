<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - RivardosPlay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div>Rivardos<span>Play</span></div>
    </div>

    <nav class="nav">
      <a href="index.html">Início</a>
      <a href="games.html">Jogos</a>
      <a href="library.html">Biblioteca</a>
      <a href="news.html">Notícias</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>

    <div class="mobile-menu">☰</div>

    <div class="top-actions">
      <a href="login.html" class="btn btn-ghost" id="loginBtn">Login</a>
    </div>
  </header>

  <main class="container">
    <section class="section-head">
      <h1>Painel Administrativo</h1>
      <p>Gerencie contas de usuários e ações administrativas exclusivas.</p>
    </section>

    <section class="admin-panel">
      <div id="adminMessage" class="admin-warning">Carregando...</div>
      <div class="admin-actions">
        <button id="refreshUsers" class="btn btn-primary">Atualizar lista</button>
      </div>

      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Usuário</th>
              <th>Email</th>
              <th>Nível</th>
              <th>XP</th>
              <th>Favoritos</th>
              <th>Horas</th>
              <th>Função</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="adminUsersTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
