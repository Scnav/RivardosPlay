<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca - RivardosPlay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div>Rivardos<span>Play</span></div>
    </div>

    <nav class="nav">
      <a href="index.html">Início</a>
      <a href="games.html">Jogos</a>
      <a href="library.html" class="active">Biblioteca</a>
      <a href="news.html">Notícias</a>
    </nav>

    <div class="mobile-menu">☰</div>

    <div class="top-actions">
      <label class="search">
        <input type="text" id="searchInput" placeholder="Buscar jogos..." />
        <span>🔍</span>
      </label>

      <a href="admin.html" class="btn btn-ghost" id="adminLink" style="display: none;">Admin</a>

      <div class="bell">🔔</div>

      <div class="user-panel" id="userPanel" style="display: none;">
        <div class="user">
          <div class="avatar" id="userAvatar">🛡️</div>
          <div class="user-info-clickable" id="userInfoClickable">
            <strong id="userName">PlayerOne</strong>
            <small>Nível <span id="userLevel">24</span></small>
          </div>
        </div>
        <button id="logoutBtn" title="Sair" style="background: none; border: none; font-size: 18px; cursor: pointer; margin-left: 8px;">🚪</button>
      </div>

      <a href="login.html" class="btn btn-ghost" id="loginBtn">Login</a>
    </div>
  </header>

  <main class="container">
    <section class="section-head">
      <h1>Biblioteca</h1>
      <p>Seus jogos favoritos e coleção pessoal.</p>
    </section>

    <section id="library">
      <div id="libraryEmptyMessage" style="text-align: center; padding: 3rem; color: var(--muted); display: none;">
        <p>Sua biblioteca está vazia.</p>
        <p>Adicione jogos clicando no ♡ nos cards da página inicial ou de jogos.</p>
      </div>
      <div class="games-grid" id="libraryGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
