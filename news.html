<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notícias - RivardosPlay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div>Rivardos<span>Play</span></div>
    </div>

    <nav class="nav">
      <a href="/">Início</a>
      <a href="/games">Jogos</a>
      <a href="/library">Biblioteca</a>
      <a href="/news" class="active">Notícias</a>
    </nav>

    <div class="mobile-menu">☰</div>

    <div class="top-actions">
      <label class="search">
        <input type="text" id="searchInput" placeholder="Buscar jogos..." />
        <span>🔍</span>
      </label>

      <a href="/admin" class="btn btn-ghost" id="adminLink" style="display: none;">Admin</a>

      <div class="bell">🔔</div>

      <div class="user-panel" id="userPanel" style="display: none;">
        <div class="user">
          <div class="avatar" id="userAvatar">🛡️</div>
          <div class="user-info-clickable" id="userInfoClickable">
            <strong id="userName">PlayerOne</strong>
            <small>Nível <span id="userLevel">24</span></small>
          </div>
        </div>
        <button id="logoutBtn" title="Sair" style="background: none; border: none; font-size: 18px; cursor: pointer; margin-left: 8px;">🚪</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section-head">
      <h1>Notícias</h1>
      <p>Últimas novidades do mundo dos jogos.</p>
    </section>

    <!-- Conteúdo de notícias será carregado aqui dinamicamente -->
    <section id="news" style="padding: 2rem 0;">
      <div class="news-grid" id="newsGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
